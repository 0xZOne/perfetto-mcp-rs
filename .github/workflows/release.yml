name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}

jobs:
  build:
    name: ${{ matrix.asset_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            asset_name: perfetto-mcp-rs-linux-amd64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
            asset_name: perfetto-mcp-rs-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-14
            asset_name: perfetto-mcp-rs-mac-amd64
          - target: aarch64-apple-darwin
            os: macos-14
            asset_name: perfetto-mcp-rs-mac-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset_name: perfetto-mcp-rs-windows-amd64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: arduino/setup-protoc@v3
        with:
          version: "28.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install musl-tools (musl targets only)
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Stage binary
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/perfetto-mcp-rs"
          if [ "${{ runner.os }}" = "Windows" ]; then
            src="${src}.exe"
          fi
          cp "$src" "${{ matrix.asset_name }}"

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: ${{ matrix.asset_name }}
          fail_on_unmatched_files: true
          # Do NOT enable `generate_release_notes` here — when set on every
          # matrix job, the action appends a "Full Changelog: ..." line per
          # job (5x), and force-pushed tag re-runs accumulate more (N x 5).
          # The publish-notes job below sets the body from CHANGELOG.md
          # exactly once, idempotently.

  publish-notes:
    name: Publish release notes from CHANGELOG
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Extract CHANGELOG section for this tag
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          # Section spans from "### [VERSION]" up to the next "### [" heading.
          # awk's "\[" in regex literals trips warnings on some gawks and
          # mismatches on others, so do this with grep + sed instead.
          HEADINGS=$(grep -n '^### \[' CHANGELOG.md)
          START=$(echo "$HEADINGS" | grep -F "### [$VERSION]" | head -1 | cut -d: -f1)
          if [ -z "$START" ]; then
            echo "::error::No CHANGELOG entry found for version $VERSION"
            exit 1
          fi
          END=$(echo "$HEADINGS" | awk -F: -v s="$START" '$1 > s { print $1 - 1; exit }')
          [ -z "$END" ] && END=$(wc -l < CHANGELOG.md)
          sed -n "${START},${END}p" CHANGELOG.md > release-notes.md
          echo "Extracted lines $START..$END ($(wc -c < release-notes.md) bytes) for $TAG"

      - name: Overwrite release body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          gh release edit "$TAG" --notes-file release-notes.md
