name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}

jobs:
  build:
    name: ${{ matrix.asset_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            asset_name: perfetto-mcp-rs-linux-amd64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
            asset_name: perfetto-mcp-rs-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-14
            asset_name: perfetto-mcp-rs-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-14
            asset_name: perfetto-mcp-rs-darwin-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset_name: perfetto-mcp-rs-windows-amd64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: arduino/setup-protoc@v3
        with:
          version: "28.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install musl-tools (musl targets only)
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          # Don't cache `~/.cargo/bin/`. Prefix-match restore + failed-build
          # skip-save lets a corrupted `cargo` (e.g. accidentally pointing at
          # rustup-init from a one-off runner-image quirk) survive forever:
          # the bad cache fails the next build, which then doesn't save a
          # replacement. v0.14.0 release was bitten by exactly this on
          # darwin-arm64 (cache from 2026-04-29 kept failing every release
          # build through 2026-05-15). 10-20s extra rustup install per run
          # is cheap insurance vs that silent failure mode.
          cache-bin: false

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Stage binary
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/perfetto-mcp-rs"
          if [ "${{ runner.os }}" = "Windows" ]; then
            src="${src}.exe"
          fi
          cp "$src" "${{ matrix.asset_name }}"

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: ${{ matrix.asset_name }}
          fail_on_unmatched_files: true
          # Do NOT enable `generate_release_notes` here — when set on every
          # matrix job, the action appends a "Full Changelog: ..." line per
          # job (5x), and force-pushed tag re-runs accumulate more (N x 5).
          # The publish-notes job below sets the body from CHANGELOG.md
          # exactly once, idempotently.

  publish-notes:
    name: Publish release notes from CHANGELOG
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Extract CHANGELOG section for this tag
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          # Section spans from "### [VERSION]" up to the next "### [" heading.
          # awk's "\[" in regex literals trips warnings on some gawks and
          # mismatches on others, so do this with grep + sed instead.
          HEADINGS=$(grep -n '^### \[' CHANGELOG.md)
          START=$(echo "$HEADINGS" | grep -F "### [$VERSION]" | head -1 | cut -d: -f1)
          if [ -z "$START" ]; then
            echo "::error::No CHANGELOG entry found for version $VERSION"
            exit 1
          fi
          END=$(echo "$HEADINGS" | awk -F: -v s="$START" '$1 > s { print $1 - 1; exit }')
          [ -z "$END" ] && END=$(wc -l < CHANGELOG.md)
          sed -n "${START},${END}p" CHANGELOG.md > release-notes.md
          echo "Extracted lines $START..$END ($(wc -c < release-notes.md) bytes) for $TAG"

      - name: Overwrite release body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          gh release edit "$TAG" --notes-file release-notes.md

  update-homebrew-tap:
    name: Update Homebrew tap formula
    needs: build
    runs-on: macos-14
    steps:
      # Mint a short-lived installation token via the GitHub App that owns
      # write access to tooluse-labs/homebrew-tap. Replaces the long-lived
      # HOMEBREW_TAP_TOKEN PAT (capped at 366 days for fine-grained tokens) —
      # App-installation tokens auto-rotate per workflow run and the App
      # credentials themselves never expire. Same pattern as the publish-crate
      # job's crates.io Trusted Publishing.
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.HOMEBREW_TAP_APP_ID }}
          private-key: ${{ secrets.HOMEBREW_TAP_APP_KEY }}
          owner: tooluse-labs
          repositories: homebrew-tap

      - uses: actions/checkout@v6
        with:
          repository: tooluse-labs/homebrew-tap
          token: ${{ steps.app-token.outputs.token }}
          path: tap

      - name: Resolve tag and version
        id: ver
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download release binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.ver.outputs.tag }}
        shell: bash
        run: |
          mkdir -p dl
          gh release download "$TAG" \
            --repo tooluse-labs/perfetto-mcp-rs \
            --dir dl \
            --pattern 'perfetto-mcp-rs-darwin-arm64' \
            --pattern 'perfetto-mcp-rs-darwin-amd64' \
            --pattern 'perfetto-mcp-rs-linux-arm64' \
            --pattern 'perfetto-mcp-rs-linux-amd64'

      - name: Compute SHA256 sums
        id: sums
        shell: bash
        run: |
          cd dl
          for f in perfetto-mcp-rs-darwin-arm64 perfetto-mcp-rs-darwin-amd64 \
                  perfetto-mcp-rs-linux-arm64 perfetto-mcp-rs-linux-amd64; do
            sum=$(shasum -a 256 "$f" | awk '{print $1}')
            slug=$(echo "$f" | sed 's/perfetto-mcp-rs-//' | tr '-' '_')
            echo "${slug}=${sum}" >> "$GITHUB_OUTPUT"
          done

      - name: Rewrite formula
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          DARWIN_ARM64: ${{ steps.sums.outputs.darwin_arm64 }}
          DARWIN_AMD64: ${{ steps.sums.outputs.darwin_amd64 }}
          LINUX_ARM64: ${{ steps.sums.outputs.linux_arm64 }}
          LINUX_AMD64: ${{ steps.sums.outputs.linux_amd64 }}
        shell: bash
        run: |
          python3 - <<'PY'
          import os
          import re
          import pathlib

          formula = pathlib.Path("tap/Formula/perfetto-mcp-rs.rb")
          src = formula.read_text()

          # Bump version line.
          src = re.sub(r'^(\s*version\s+)"[^"]*"',
                       lambda m: f'{m.group(1)}"{os.environ["VERSION"]}"',
                       src, count=1, flags=re.M)

          # Replace each platform's sha256. The formula has the URL line
          # immediately followed by sha256 line per platform — we anchor on
          # the asset name in the URL.
          replacements = {
              "perfetto-mcp-rs-darwin-arm64": os.environ["DARWIN_ARM64"],
              "perfetto-mcp-rs-darwin-amd64": os.environ["DARWIN_AMD64"],
              "perfetto-mcp-rs-linux-arm64": os.environ["LINUX_ARM64"],
              "perfetto-mcp-rs-linux-amd64": os.environ["LINUX_AMD64"],
          }
          for asset, sha in replacements.items():
              pattern = (
                  rf'(url\s+"[^"]*{re.escape(asset)}"\s*\n\s*sha256\s+)"[^"]*"'
              )
              src = re.sub(pattern, lambda m, s=sha: f'{m.group(1)}"{s}"', src,
                           count=1)

          formula.write_text(src)
          PY

      - name: Lint formula with brew style
        shell: bash
        run: brew style ./tap/Formula/perfetto-mcp-rs.rb

      - name: Commit and push
        shell: bash
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          cd tap
          git config user.name "perfetto-mcp-rs release bot"
          git config user.email "noreply@github.com"
          if git diff --quiet Formula/perfetto-mcp-rs.rb; then
            echo "::notice::Formula already at v$VERSION; nothing to push"
            exit 0
          fi
          git add Formula/perfetto-mcp-rs.rb
          git commit -m "chore: bump perfetto-mcp-rs to v$VERSION"
          git push origin HEAD:main

  publish-crate:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    # Trusted Publishing: GitHub OIDC token → short-lived crates.io credential.
    # Configured at https://crates.io/crates/perfetto-mcp-rs/settings under
    # Trusted Publishers (workflow filename release.yml, no environment).
    # No static `CARGO_REGISTRY_TOKEN` secret needed.
    permissions:
      id-token: write   # mint the OIDC token
      contents: read    # default token for actions/checkout on public repo
    steps:
      - uses: actions/checkout@v6

      - uses: arduino/setup-protoc@v3
        with:
          version: "28.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: publish-crate
          cache-bin: false

      # Idempotency guard: tolerate re-tagging or any future "manual-publish-
      # then-tag" bootstrap path. Hits the public crates.io API anonymously
      # (no auth needed) and skips `cargo publish` when the version already
      # exists rather than failing with "already exists".
      - name: Check if version already published
        id: check
        shell: bash
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          if curl -sf "https://crates.io/api/v1/crates/perfetto-mcp-rs/$VERSION" > /dev/null; then
            echo "::notice::v$VERSION already on crates.io — skipping publish"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
        if: steps.check.outputs.skip == 'false'

      - name: cargo publish
        if: steps.check.outputs.skip == 'false'
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish --locked
