name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}

jobs:
  build:
    name: ${{ matrix.asset_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            asset_name: perfetto-mcp-rs-linux-amd64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
            asset_name: perfetto-mcp-rs-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-14
            asset_name: perfetto-mcp-rs-mac-amd64
          - target: aarch64-apple-darwin
            os: macos-14
            asset_name: perfetto-mcp-rs-mac-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset_name: perfetto-mcp-rs-windows-amd64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Stage binary
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/perfetto-mcp-rs"
          if [ "${{ runner.os }}" = "Windows" ]; then
            src="${src}.exe"
          fi
          cp "$src" "${{ matrix.asset_name }}"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: ${{ matrix.asset_name }}
          fail_on_unmatched_files: true
          generate_release_notes: true
