  <text x="640" y="544" text-anchor="middle" fill="#C8D8E6" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="600">
