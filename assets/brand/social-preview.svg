  <path d="M0 520H1280" stroke="#2C4661" stroke-opacity="0.28" stroke-width="2"/>
  <path d="M112 62H1168" stroke="#496780" stroke-opacity="0.20" stroke-width="2" stroke-linecap="round"/>
  <path d="M112 578H1168" stroke="#496780" stroke-opacity="0.20" stroke-width="2" stroke-linecap="round"/>

