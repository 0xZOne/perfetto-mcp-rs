      <stop offset="0.5" stop-color="#76CDEB" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#4D6885" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="spShadow" x="72" y="60" width="1136" height="330" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
