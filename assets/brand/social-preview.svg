      <stop offset="1" stop-color="#18324B"/>
    </linearGradient>
    <linearGradient id="spWarm" x1="148" y1="146" x2="318" y2="146" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF765C"/>
      <stop offset="1" stop-color="#FFA14A"/>
