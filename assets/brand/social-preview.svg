<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">perfetto-mcp-rs social preview</title>
  <desc id="desc">GitHub social preview image for perfetto-mcp-rs, featuring the current trace and MCP wordmark on a branded background.</desc>
  <defs>
    <linearGradient id="spBg" x1="96" y1="24" x2="1150" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101826"/>
      <stop offset="0.58" stop-color="#17304A"/>
      <stop offset="1" stop-color="#1C405F"/>
    </linearGradient>
    <linearGradient id="spPanel" x1="120" y1="92" x2="1160" y2="372" gradientUnits="userSpaceOnUse">
