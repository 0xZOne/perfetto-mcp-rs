<svg width="944" height="216" viewBox="18 22 944 216" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">perfetto-mcp-rs horizontal wordmark</title>
  <desc id="desc">A horizontal wordmark for perfetto-mcp-rs combining a trace and MCP node mark with the project name.</desc>
  <defs>
    <linearGradient id="owPanel" x1="42" y1="18" x2="928" y2="246" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101826"/>
      <stop offset="1" stop-color="#18324B"/>
    </linearGradient>
    <linearGradient id="owWarm" x1="148" y1="146" x2="318" y2="146" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF765C"/>
      <stop offset="1" stop-color="#FFA14A"/>
    </linearGradient>
    <linearGradient id="owCool" x1="148" y1="238" x2="292" y2="238" gradientUnits="userSpaceOnUse">
      <stop stop-color="#49C9F3"/>
      <stop offset="1" stop-color="#5CE0C3"/>
    </linearGradient>
    <linearGradient id="owGold" x1="148" y1="330" x2="338" y2="330" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4B640"/>
      <stop offset="1" stop-color="#FFD86F"/>
    </linearGradient>
    <linearGradient id="owNode" x1="296" y1="132" x2="416" y2="306" gradientUnits="userSpaceOnUse">
      <stop stop-color="#B9F5FF"/>
      <stop offset="1" stop-color="#75D2FF"/>
    </linearGradient>
  </defs>

  <g>
    <rect x="18" y="22" width="944" height="216" rx="42" fill="url(#owPanel)"/>

    <svg x="54" y="42" width="184" height="176" viewBox="82 96 368 300" fill="none">
      <g transform="translate(0 10)">
        <path d="M118 146H318" stroke="#24384C" stroke-width="18" stroke-linecap="round"/>
        <path d="M118 238H294" stroke="#24384C" stroke-width="18" stroke-linecap="round"/>
        <path d="M118 330H338" stroke="#24384C" stroke-width="18" stroke-linecap="round"/>

        <rect x="100" y="116" width="34" height="246" rx="17" fill="#EFF6FB"/>

        <rect x="148" y="126" width="154" height="40" rx="20" fill="url(#owWarm)"/>
        <rect x="310" y="126" width="32" height="40" rx="16" fill="#F3A281" fill-opacity="0.95"/>

        <rect x="148" y="218" width="116" height="40" rx="20" fill="url(#owCool)"/>
        <rect x="272" y="218" width="52" height="40" rx="20" fill="#76E8D6" fill-opacity="0.98"/>

        <rect x="148" y="310" width="94" height="40" rx="20" fill="url(#owGold)"/>
        <rect x="250" y="310" width="84" height="40" rx="20" fill="#FFD978" fill-opacity="0.98"/>

        <path d="M342 146H356L404 194M324 238H354L404 194M334 330H366L404 292" stroke="url(#owNode)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>

        <circle cx="356" cy="146" r="18" fill="#A8EDFF"/>
        <circle cx="404" cy="194" r="25" fill="#E5FAFF"/>
        <circle cx="404" cy="292" r="25" fill="#E5FAFF"/>
        <circle cx="404" cy="194" r="34" fill="#A8EDFF" fill-opacity="0.12"/>
        <circle cx="404" cy="292" r="34" fill="#A8EDFF" fill-opacity="0.12"/>
      </g>
    </svg>

    <text x="268" y="122" fill="#F4F9FD" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="64" font-weight="800">
      <tspan>perfetto</tspan><tspan fill="#A9EEFF">-mcp</tspan><tspan fill="#FFD86F">-rs</tspan>
    </text>
    <text x="272" y="170" fill="#B9CBDA" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="600">
